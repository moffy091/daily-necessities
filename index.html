<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日用品ストック表</title>
  <style>
    /* 全体 */
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: rgba(255, 241, 224, 0.211);
      color: #333;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #fff1e0;
      border-bottom: 1px solid #e6d3bf;
      padding: 1.2rem 2rem;
    }

    h1 {
      color: #604029;
      font-size: 1.4rem;
      margin: 0.5rem auto;
      max-width: 800px;
    }

    /* メインカード */
    main {
      max-width: 800px;
      margin: 2rem auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      padding: 0 1rem;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      padding: 1rem 2rem;
      position: relative;
      overflow: visible;
    }

    /* フォーム */
    form {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1rem;
      flex-wrap: nowrap;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.6rem 0.8rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      min-width: 0;
    }

    button[type="submit"] {
      background-color: #ff9800;
      border: none;
      color: white;
      font-weight: bold;
      padding: 0.6rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
    }

    button[type="submit"]:hover {
      background-color: #e68900;
    }

    #clear-all {
      background-color: #c0392b;
      border: none;
      color: white;
      font-weight: bold;
      padding: 0.6rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
    }

    p {
      color: #cdc6be;
      margin: 0;
      font-size: 0.85rem;
    }

    /* リスト */
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      background-color: #fafafa;
      border: 1px dashed #f3f3f3;
      border-radius: 12px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      box-sizing: border-box;
      padding: 0.6rem 1.2rem;
      flex-wrap: wrap;
    }

    /* 品名 */
    .item-name {
      flex: 1;
      font-size: 1rem;
      color: #604029;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }


    /* 数量エリア */
    .count-area {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.95rem;
      color: #604029;
    }

    /* 「数量：」ラベル */
    .count-area span:first-child {
      font-weight: 530;
    }

    /* ＋−ボタン */
    .count-btn {
      background-color: #fff;
      border: 1px solid #ccc;
      border-radius: 9999px;
      width: 32px;
      height: 32px;
      font-size: 1rem;
      font-weight: bold;
      line-height: 1;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .count-btn:hover {
      background-color: #dcdbdb;
    }

    .count-area span:nth-child(2) {
      font-weight: 550;
      margin-right: 4px;
    }

    .count-btn:active {
      transform: scale(0.92);
      background-color: #ffe0b2;
    }


    /* ボタン群の配置調整 */
    .button-group {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: flex-end;
      flex-shrink: 0;
      margin-left: 10px;
    }

    /* 各ボタン */
    .edit-btn,
    .status-btn,
    .delete-btn {
      border: none;
      border-radius: 9999px;
      padding: 8px 12px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.2s;
      background-color: #fff;
    }

    .edit-btn {
      color: #7a4b22;
      border: 1px solid #e7c39d;
      font-weight: bold;
    }

    .edit-btn:hover {
      background-color: #fff0df;
    }


    .status-btn.has-stock {
      color: #2e7d32;
      border: 1px solid #a5d6a7;
      font-weight: bold;
    }

    .status-btn.no-stock {
      color: #c62828;
      border: 1px solid #ef9a9a;
      font-weight: bold;
    }

    .delete-btn {
      color: #333;
      border: 1px solid #ccc;
    }

    .delete-btn:hover {
      background-color: #ccc;
    }

    /* ドラッグハンドル */
    .drag-handle {
      width: 28px;
      height: 24px;
      cursor: grab;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .drag-handle::before {
      content: '';
      display: block;
      width: 16px;
      height: 3px;
      background-color: #666;
      border-radius: 2px;
      box-shadow:
        0 5px 0 #666,
        0 10px 0 #666;
    }

    .drag-handle:hover::before {
      background-color: #ff9800;
      box-shadow:
        0 5px 0 #ff9800,
        0 10px 0 #ff9800;
    }

    .drag-handle:active {
      cursor: grabbing;
      opacity: 0.8;
    }

    /* スマホ対応 */
    @media (max-width: 480px) {
      form {
        gap: 6px;
      }

      input[type="text"] {
        font-size: 0.9rem;
        padding: 0.5rem 0.6rem;
      }

      button[type="submit"],
      #clear-all {
        padding: 0.5rem 0.7rem;
        font-size: 0.85rem;
        white-space: nowrap;
      }

      li {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
        padding: 0.6rem 1rem;
      }

      .button-group {
        width: 100%;
        justify-content: flex-end;
        margin-left: 4px;
      }

      .status-btn,
      .delete-btn {
        padding: 5px 8px;
        font-size: 0.8rem;
      }

      .drag-handle {
        width: 22px;
        height: 20px;
      }

      .count-area {
        gap: 4px;
        font-size: 0.85rem;
      }

      .count-btn {
        width: 26px;
        height: 26px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>日用品ストック表</h1>
  </header>

  <main>
    <section class="card">
      <form id="stock-form">
        <input type="text" id="item-name" placeholder="例：シャンプー / ティッシュ " required>
        <button type="submit">追加</button>
        <button type="button" id="clear-all">全消去</button>
      </form>
      <p>◯＝在庫あり ／ ×＝在庫なし。操作は自動保存されます。</p>
    </section>

    <section class="card">
      <ul id="stock-list"></ul>
    </section>
  </main>
  <!--Sortable.jsを読み込み-->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>


  <script>
    // localStorage に保存するキー名を定数化
    const STORAGE_KEY = 'stockItems';

    // 初回表示だけ使うデータ
    const defaultItems = [
      { name: 'シャンプー', inStock: true, count: 2 },
      { name: 'リンス', inStock: true, count: 2 },
      { name: 'ボディソープ', inStock: true, count: 1 },
      { name: '食器用洗剤', inStock: true, count: 1 },
      { name: '洗濯洗剤', inStock: true, count: 1 }
    ];

    // フォーム要素を取得
    // 追加ボタンを押した時の処理
    const form = document.getElementById('stock-form');
    // 入力欄を取得
    // ユーザーが入力した商品名をここから読む
    const itemNameInput = document.getElementById('item-name');
    // 一覧を表示する<ul>を取得

    const stockList = document.getElementById('stock-list');
    const clearAllButton = document.getElementById('clear-all');

    // 保存済みデータを読み込む
    // まだ一度も保存されていない初回だけ defaultItems を入れる
    function loadItems() {
      const stored = localStorage.getItem(STORAGE_KEY);

      if (stored === null) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultItems));
        return [...defaultItems];
      }

      // JSON が壊れていた場合も復旧できるようにしておく
      try {
        const parsed = JSON.parse(stored);
        return Array.isArray(parsed) ? parsed : [...defaultItems];
      } catch {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultItems));
        return [...defaultItems];
      }
    }

    let items = loadItems();


    // 在庫状態ボタンに表示する文字を決める関数
    // inStockがtrueなら在庫あり、false なら在庫し
    function labelForStatus(inStock) {
      return inStock ? '◯ 在庫あり' : '× 在庫なし';
    }

    // 削除ボタンの文字
    function labelForDelete() {
      return '削除';
    }

    function renderList() {
      stockList.innerHTML = '';

      items.forEach((item, index) => {
        
        const editBtn = document.createElement('button');

        editBtn.type = 'button';
        editBtn.className = 'edit-btn';
        editBtn.textContent = '編集';
        editBtn.addEventListener('click', () => {
          const newName = prompt('商品名を入力してください', item.name);

          if (newName === null) return;

          const trimmedName = newName.trim();
          if (!trimmedName) return;

          item.name = trimmedName;
          saveItems();
          renderList();
        });

        const li = document.createElement('li');
        li.dataset.index = index;

        const nameSpan = document.createElement('span');
        nameSpan.className = 'item-name';
        nameSpan.textContent = item.name;

        // 数量表示と＋−ボタン
        const countArea = document.createElement('div');
        countArea.className = 'count-area';

        const qtyLabel = document.createElement('span');
        qtyLabel.textContent = '数量：';

        const qtyValue = document.createElement('span');
        qtyValue.textContent = String(item.count ?? 0);


        const plusBtn = document.createElement('button');
        plusBtn.className = 'count-btn';
        plusBtn.textContent = '＋';
        plusBtn.type = 'button';
        plusBtn.addEventListener('click', () => {
          // 数量を増やしたら、在庫ありに揃える
          item.count = (item.count ?? 0) + 1;
          item.inStock = item.count > 0;
          saveItems();
          renderList();
        });


        // - ボタンを作る
        const minusBtn = document.createElement('button');
        minusBtn.className = 'count-btn';
        minusBtn.textContent = '−'; 
        minusBtn.type = 'button';

        // - ボタンを押した時の処理
        minusBtn.addEventListener('click', () => {
          // 0 未満にならに用にしつつ、数量と在庫状態を同期
          item.count = Math.max((item.count ?? 0) - 1, 0);
          item.inStock = item.count > 0;
          // 更新したデータを保存
          saveItems();
          // 画面を描画し直して数量表示を更新
          renderList();
        });

        countArea.append(qtyLabel, qtyValue, plusBtn, minusBtn);

        // ボタン群
        const buttonGroup = document.createElement('div');
        buttonGroup.className = 'button-group';

        const statusBtn = document.createElement('button');
        statusBtn.className = `status-btn ${item.inStock ? 'has-stock' : 'no-stock'}`;
        statusBtn.textContent = labelForStatus(item.inStock);
        statusBtn.type = 'button';
        statusBtn.addEventListener('click', () => {
          // 在庫状態だけ変えると count と矛盾するので、
          // 数量を必ず合わせる
          item.inStock = !item.inStock;
          item.count = item.inStock ? Math.max(item.count ?? 0, 1) : 0;
          saveItems();
          renderList();
        });

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.textContent = labelForDelete();
        deleteBtn.type = 'button';
        deleteBtn.addEventListener('click', () => {
          items.splice(index, 1);
          saveItems();
          renderList();
        });

        const dragHandle = document.createElement('div');
        dragHandle.className = 'drag-handle';
        dragHandle.title = "ドラッグして並び替え";

        buttonGroup.append(editBtn, statusBtn, deleteBtn, dragHandle);
        li.append(nameSpan, countArea, buttonGroup);
        stockList.appendChild(li);
      });
    }

    // 並び替えは Sortable.jsに一本化
    // oldIndex/newIndex を使って配列そのものを並べ替える
    new Sortable(stockList, {
      animation: 150,
      handle: '.drag-handle',
      onEnd: function (evt) {
        const movedItem = items.splice(evt.oldIndex, 1)[0];
        items.splice(evt.newIndex, 0, movedItem);
        saveItems();
        renderList();
      }
    });

    //itemの内容をlocalStorage に保存する
    // JSON.stringify()で文字列に変換する
    function saveItems() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const name = itemNameInput.value.trim();
      if (!name) return;
      items.push({ name, inStock: true, count: 1 });
      saveItems();
      renderList();
      itemNameInput.value = '';
    });
    // 全消去ボタン
    clearAllButton.addEventListener('click', () => {
      if (confirm('全てを削除しますか？')) {
        //  localStorage を削除せず空配列を保存する
        items = [];
        saveItems();
        renderList();
      }
    });

    renderList();
  </script>
</body>

</html>
